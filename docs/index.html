<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFund 基金业绩展示</title>
  <style>
    :root { --bg:#f5f7fb; --card:#fff; --text:#111827; --muted:#6b7280; --line:#e5e7eb; --brand:#2563eb; --brand-soft:rgba(37,99,235,.12); --up:#dc2626; --down:#16a34a; --shadow:0 8px 30px rgba(17,24,39,.06); --radius:16px; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    .page { max-width:1440px; margin:0 auto; padding:28px 20px 40px; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; flex-wrap:wrap; }
    .hero,.section,.table-wrap { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); }
    .hero { padding:24px; margin-bottom:18px; }
    .eyebrow { color:var(--brand); font-size:13px; font-weight:700; margin-bottom:10px; }
    h1 { margin:0 0 8px; font-size:30px; line-height:1.25; }
    .sub { color:var(--muted); font-size:14px; }
    .fund-tabs { display:flex; gap:10px; flex-wrap:wrap; margin:0; }
    .fund-tab,.pill,.export-btn { border:1px solid var(--line); background:#fff; color:#374151; border-radius:999px; padding:9px 14px; cursor:pointer; font-size:13px; font-weight:600; }
    .fund-tab.active,.pill.active { background:#111827; color:#fff; border-color:#111827; }
    .export-btn { color:var(--brand); border-color:var(--brand); }
    .export-btn:hover { background:var(--brand-soft); }
    .grid-6 { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:12px; margin-top:18px; }
    .metric-card,.ret-card { background:linear-gradient(180deg,#fff,#fbfdff); border:1px solid #eef2f7; border-radius:14px; padding:14px 16px; }
    .metric-card .label,.ret-card .k { color:var(--muted); font-size:12px; margin-bottom:8px; }
    .metric-card .value,.ret-card .v { font-size:24px; font-weight:700; }
    .metric-card .note { color:var(--muted); font-size:12px; margin-top:6px; }
    .pos { color:var(--up); } .neg { color:var(--down); }
    .layout { display:grid; grid-template-columns:minmax(0,2.1fr) minmax(320px,1fr); gap:18px; margin-bottom:18px; }
    .section { padding:18px; }
    .section h2 { margin:0 0 12px; font-size:18px; }
    .section .section-sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
    .toolbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .chart-shell { position:relative; height:420px; border-radius:14px; background:linear-gradient(180deg,#fcfdff,#fff); border:1px solid #eff3f8; overflow:hidden; }
    #chart { width:100%; height:100%; display:block; }
    .tooltip { position:absolute; pointer-events:none; background:rgba(17,24,39,.92); color:#fff; padding:10px 12px; border-radius:10px; font-size:12px; min-width:132px; max-width:220px; opacity:0; transition:opacity .12s ease; box-shadow:0 8px 20px rgba(0,0,0,.18); white-space:nowrap; }
    .tooltip .t1 { font-weight:700; margin-bottom:4px; }
    .legend { display:flex; gap:16px; margin-top:10px; color:var(--muted); font-size:12px; flex-wrap:wrap; }
    .legend span::before { content:''; display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
    .legend .nav::before { background:#2563eb; } .legend .ret::before { background:#f59e0b; }
    .legend .idx1::before { background:rgba(99,102,241,.55); } .legend .idx2::before { background:rgba(16,185,129,.55); } .legend .idx3::before { background:rgba(245,158,11,.55); } .legend .idx4::before { background:rgba(236,72,153,.55); }
    .stat-list { display:grid; gap:10px; }
    .stat-item { display:flex; justify-content:space-between; gap:12px; padding:12px 0; border-bottom:1px dashed var(--line); }
    .stat-item:last-child { border-bottom:0; }
    .stat-item .k { color:var(--muted); font-size:13px; }
    .stat-item .v { font-weight:600; text-align:right; }
    .ret-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; margin-bottom:18px; }
    .table-wrap { padding:18px; }
    .table-header { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
    input[type="search"] { padding:10px 12px; min-width:240px; border-radius:10px; border:1px solid var(--line); }
    table { width:100%; border-collapse:collapse; }
    th,td { padding:11px 10px; border-bottom:1px solid #eef2f7; text-align:left; font-size:13px; }
    th { color:var(--muted); font-weight:600; cursor:pointer; }
    tbody tr:hover { background:#fafcff; }
    @media (max-width:1200px){ .grid-6{grid-template-columns:repeat(3,minmax(0,1fr));} }
    @media (max-width:980px){ .layout{grid-template-columns:1fr;} .ret-grid{grid-template-columns:repeat(2,minmax(0,1fr));} }
    @media (max-width:640px){ .grid-6,.ret-grid{grid-template-columns:1fr;} .page{padding:16px;} .hero{padding:18px;} h1{font-size:24px;} }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="fund-tabs" id="fundTabs"></div>
      <button class="export-btn" id="exportBtn">导出当前 tab 数据</button>
    </div>

    <section class="hero">
      <div class="eyebrow">基金业绩概览</div>
      <h1 id="heroTitle">加载中...</h1>
      <div class="sub" id="heroSub">正在加载基金与指数数据...</div><div class="sub" id="lastUpdatedText" style="margin-top:8px; color:#6b7280;">最后更新时间：加载中</div>
      <div class="grid-6" id="metricGrid"></div>
    </section>

    <div class="ret-grid" id="retGrid"></div>

    <div class="layout">
      <section class="section">
        <h2>净值与累计收益互动图表</h2>
        <div class="section-sub">支持窗口自适应、鼠标悬停查看日期与对应数据。</div>
        <div class="toolbar">
          <button class="pill" data-series="nav">单位净值</button>
          <button class="pill" data-series="return">累计收益率</button>
          <button class="pill active" data-series="compare">归一化对比</button>
        </div>
        <div class="section-sub" id="chartDesc">当前为归一化对比模式，基金与四条宽基指数均从同一起点出发，便于观察相对收益与超额表现。</div>
        <div class="chart-shell" id="chartShell"><canvas id="chart"></canvas><div class="tooltip" id="tooltip"></div></div>
        <div class="legend"><span class="nav">基金主线</span><span class="ret">基金累计收益率</span><span class="idx1">上证指数</span><span class="idx2">沪深300</span><span class="idx3">中证500</span><span class="idx4">中证1000</span></div>
      </section>
      <aside class="section">
        <h2>关键业绩指标</h2>
        <div class="section-sub">先看收益，再看风险，最后看极值与回撤。</div>
        <div class="stat-list" id="statList"></div>
      </aside>
    </div>

    <section class="table-wrap">
      <div class="table-header">
        <div><h2 style="margin:0 0 4px; font-size:18px;">净值明细表</h2><div class="sub">可搜索、排序，适合核对原始记录与提取结果。</div></div>
        <input id="search" type="search" placeholder="搜索日期、标题、净值" />
      </div>
      <table id="navTable">
        <thead><tr><th data-key="valuation_date">估值日期</th><th data-key="unit_nav">单位净值</th><th data-key="cum_return">累计收益率</th><th data-key="accum_nav">累计单位净值</th><th data-key="nav_assets">资产净值</th><th data-key="paid_in_capital">实收资本</th><th data-key="received_at">收件时间</th><th data-key="subject">邮件标题</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <script>
    let fundConfigs = {};
    let benchmarks = {};
    let currentFund = 'SBFZ85';
    const chartModeByFund = { SBFZ85: 'compare', SBFZ95: 'compare' };
    let data = [];
    let filtered = [];
    let sortKey = 'valuation_date';
    let sortAsc = false;
    let currentSeries = 'compare';

    const fmtPct = v => `${v >= 0 ? '+' : ''}${(v * 100).toFixed(2)}%`;
    const fmtNav = v => Number(v).toFixed(4);
    const fmtMoney = v => Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    async function fetchJson(paths) {
      for (const path of paths) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          return await res.json();
        } catch (e) {}
      }
      throw new Error('无法加载数据文件: ' + paths.join(' | '));
    }

    async function loadData() {
      const [f85, f95, idx] = await Promise.all([
        fetchJson(['./data/sbfz85_nav_enriched.json', 'data/sbfz85_nav_enriched.json']),
        fetchJson(['./data/sbfz95_nav_enriched.json', 'data/sbfz95_nav_enriched.json']),
        fetchJson(['./data/benchmark_indices.json', 'data/benchmark_indices.json']),
      ]);
      fundConfigs = {
        SBFZ85: { name: '衍盛天璇CTA一号私募证券投资基金', code: 'SBFZ85', ...f85 },
        SBFZ95: { name: '衍盛开阳多策略混合私募证券投资基金', code: 'SBFZ95', ...f95 },
      };
      benchmarks = idx;
      renderFundTabs();
      applyFundConfig();
      renderTable();
      drawChart();
    }

    function renderFundTabs() {
      const tabs = document.getElementById('fundTabs');
      tabs.innerHTML = `
        <button class="fund-tab ${currentFund === 'SBFZ85' ? 'active' : ''}" data-fund="SBFZ85">天璇 CTA 一号</button>
        <button class="fund-tab ${currentFund === 'SBFZ95' ? 'active' : ''}" data-fund="SBFZ95">开阳 多策略混合</button>`;
      tabs.querySelectorAll('.fund-tab').forEach(btn => btn.addEventListener('click', () => {
        currentFund = btn.dataset.fund;
        renderFundTabs();
        applyFundConfig();
        renderTable();
        drawChart();
      }));
    }

    function applyFundConfig() {
      data = fundConfigs[currentFund].rows;
      filtered = [...data].sort((a, b) => b.valuation_date.localeCompare(a.valuation_date));
      currentSeries = chartModeByFund[currentFund] || 'compare';
      document.querySelectorAll('.pill').forEach(x => x.classList.toggle('active', x.dataset.series === currentSeries));
      const m = fundConfigs[currentFund].metrics;
      document.getElementById('heroTitle').textContent = `${fundConfigs[currentFund].name}，净值与收益率分析`;
      document.getElementById('lastUpdatedText').textContent = `最后更新时间：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
      document.getElementById('heroSub').textContent = `基于邮件抓取的 ${data.length} 个估值日样本，覆盖 ${data[0].valuation_date} 至 ${data[data.length - 1].valuation_date}。`;
      document.getElementById('lastUpdatedText').textContent = `最后更新时间：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
      document.getElementById('metricGrid').innerHTML = `
        <div class="metric-card"><div class="label">最新单位净值</div><div class="value">${fmtNav(m.latest_nav)}</div><div class="note">截至 ${m.latest_date}</div></div>
        <div class="metric-card"><div class="label">成立以来收益</div><div class="value ${m.since_inception >= 0 ? 'pos' : 'neg'}">${fmtPct(m.since_inception)}</div><div class="note">相对首个样本日</div></div>
        <div class="metric-card"><div class="label">近 20 个估值日</div><div class="value ${m.last_20d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_20d)}</div><div class="note">短中期表现</div></div>
        <div class="metric-card"><div class="label">最大回撤</div><div class="value neg">-${(m.max_drawdown.value * 100).toFixed(2)}%</div><div class="note">${m.max_drawdown.start.valuation_date} → ${m.max_drawdown.end.valuation_date}</div></div>
        <div class="metric-card"><div class="label">年化波动率</div><div class="value">${(m.annualized_vol * 100).toFixed(2)}%</div><div class="note">按样本日频近似</div></div>
        <div class="metric-card"><div class="label">样本区间</div><div class="value">${data.length}</div><div class="note">条记录</div></div>`;
      document.getElementById('retGrid').innerHTML = `
        <div class="ret-card"><div class="k">近 5 个估值日收益</div><div class="v ${m.last_5d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_5d)}</div></div>
        <div class="ret-card"><div class="k">近 20 个估值日收益</div><div class="v ${m.last_20d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_20d)}</div></div>
        <div class="ret-card"><div class="k">近 60 个估值日收益</div><div class="v ${m.last_60d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_60d)}</div></div>`;
      document.getElementById('statList').innerHTML = `
        <div class="stat-item"><div class="k">最高单位净值</div><div class="v pos">${fmtNav(m.max_nav.unit_nav)}<br><span class="sub">${m.max_nav.valuation_date}</span></div></div>
        <div class="stat-item"><div class="k">最低单位净值</div><div class="v neg">${fmtNav(m.min_nav.unit_nav)}<br><span class="sub">${m.min_nav.valuation_date}</span></div></div>
        <div class="stat-item"><div class="k">最大回撤区间</div><div class="v">${m.max_drawdown.start.valuation_date} → ${m.max_drawdown.end.valuation_date}</div></div>
        <div class="stat-item"><div class="k">回撤对应净值</div><div class="v">${fmtNav(m.max_drawdown.start.unit_nav)} → ${fmtNav(m.max_drawdown.end.unit_nav)}</div></div>
        <div class="stat-item"><div class="k">样本起始日</div><div class="v">${data[0].valuation_date}</div></div>
        <div class="stat-item"><div class="k">样本最新日</div><div class="v">${data[data.length - 1].valuation_date}</div></div>`;
      document.getElementById('chartDesc').textContent = currentSeries === 'compare' ? '当前为归一化对比模式，基金与四条宽基指数均从同一起点出发。' : '支持窗口自适应、鼠标悬停查看日期与对应数据。';
    }

    function renderTable() {
      const tbody = document.querySelector('#navTable tbody');
      tbody.innerHTML = filtered.map(r => `<tr><td>${r.valuation_date}</td><td class="${r.unit_nav >= 1 ? 'pos' : 'neg'}">${fmtNav(r.unit_nav)}</td><td class="${r.cum_return >= 0 ? 'pos' : 'neg'}">${fmtPct(r.cum_return)}</td><td>${fmtNav(r.accum_nav)}</td><td>${fmtMoney(r.nav_assets)}</td><td>${fmtMoney(r.paid_in_capital)}</td><td>${r.received_at}</td><td>${r.subject}</td></tr>`).join('');
    }

    function sortBy(key, keepDirection = false) {
      if (!keepDirection) {
        if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
      }
      filtered.sort((a, b) => {
        const va = a[key], vb = b[key];
        if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb), 'zh-CN') : String(vb).localeCompare(String(va), 'zh-CN');
      });
      renderTable();
    }

    function drawChart() {
      const canvas = document.getElementById('chart');
      const shell = document.getElementById('chartShell');
      const tooltip = document.getElementById('tooltip');
      const dpr = window.devicePixelRatio || 1;
      const rect = shell.getBoundingClientRect();
      canvas.width = rect.width * dpr; canvas.height = rect.height * dpr; canvas.style.width = rect.width + 'px'; canvas.style.height = rect.height + 'px';
      const ctx = canvas.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const sorted = [...data].sort((a, b) => a.valuation_date.localeCompare(b.valuation_date));
      const pad = { top: 22, right: 18, bottom: 34, left: 58 }, w = rect.width, h = rect.height;
      const fundSeriesAccessor = currentSeries === 'nav' ? (d => d.unit_nav) : currentSeries === 'return' ? (d => d.cum_return) : (d => d.unit_nav / sorted[0].unit_nav);
      const benchmarkSeries = ['上证指数','沪深300','中证500','中证1000'].flatMap(name => (benchmarks[name] || []).map(item => ({ ...item, name }))).filter(item => sorted.some(s => s.valuation_date === item.date));
      const values = [...sorted.map(fundSeriesAccessor), ...(currentSeries === 'compare' ? benchmarkSeries.map(d => d.norm) : [])];
      const min = Math.min(...values), max = Math.max(...values), range = (max - min) || 1;
      const x = i => pad.left + (i * (w - pad.left - pad.right) / Math.max(sorted.length - 1, 1));
      const y = v => pad.top + (max - v) * (h - pad.top - pad.bottom) / range;
      ctx.clearRect(0,0,w,h); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
      for (let i=0;i<5;i++){ const yy = pad.top + i*(h-pad.top-pad.bottom)/4; ctx.strokeStyle='#eef2f7'; ctx.beginPath(); ctx.moveTo(pad.left,yy); ctx.lineTo(w-pad.right,yy); ctx.stroke(); const lv=max-i*range/4; const label=currentSeries==='nav'?fmtNav(lv):currentSeries==='return'?fmtPct(lv):`${(lv*100).toFixed(1)}%`; ctx.fillStyle='#6b7280'; ctx.font='12px sans-serif'; ctx.fillText(label,6,yy+4); }
      const indexMeta = [{ name:'上证指数', color:'rgba(99,102,241,.55)'},{ name:'沪深300', color:'rgba(16,185,129,.55)'},{ name:'中证500', color:'rgba(245,158,11,.55)'},{ name:'中证1000', color:'rgba(236,72,153,.55)'}];
      indexMeta.forEach(meta => { if (currentSeries !== 'compare') return; const series=(benchmarks[meta.name]||[]).filter(d => sorted.some(s => s.valuation_date===d.date)); if(!series.length) return; ctx.beginPath(); series.forEach((d,i)=>{ const idx=sorted.findIndex(s=>s.valuation_date===d.date); if(idx<0) return; const px=x(idx), py=y(d.norm); if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }); ctx.lineWidth=1.4; ctx.setLineDash([5,5]); ctx.strokeStyle=meta.color; ctx.stroke(); ctx.setLineDash([]); });
      const stroke = currentSeries === 'nav' ? '#2563eb' : currentSeries === 'return' ? '#f59e0b' : '#2563eb';
      const fill = currentSeries === 'nav' ? 'rgba(37,99,235,.12)' : currentSeries === 'return' ? 'rgba(245,158,11,.14)' : 'rgba(37,99,235,.10)';
      ctx.beginPath(); sorted.forEach((d,i)=>{ const px=x(i), py=y(fundSeriesAccessor(d)); if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py); }); ctx.lineWidth=2.5; ctx.strokeStyle=stroke; ctx.stroke(); ctx.lineTo(x(sorted.length-1),h-pad.bottom); ctx.lineTo(x(0),h-pad.bottom); ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
      const points = sorted.map((d,i)=>({ x:x(i), y:y(fundSeriesAccessor(d)), row:d })); points.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,3.2,0,Math.PI*2); ctx.fillStyle=stroke; ctx.fill(); });
      canvas._points = points; canvas._drawState = { dpr, pad, h, w, sorted };
      if (!canvas._boundHover) {
        canvas.addEventListener('mousemove', e => {
          const r = canvas.getBoundingClientRect(); const mx=e.clientX-r.left, my=e.clientY-r.top; const livePoints=canvas._points||[]; let nearest=-1, dist=Infinity; livePoints.forEach((p,idx)=>{ const d=Math.hypot(p.x-mx,p.y-my); if(d<dist){dist=d; nearest=idx;} }); drawChart(); const p=(canvas._points||[])[nearest]; const state=canvas._drawState; if(!p||!state) return; const value=currentSeries==='nav'?fmtNav(p.row.unit_nav):currentSeries==='return'?fmtPct(p.row.cum_return):fmtNav(p.row.unit_nav/state.sorted[0].unit_nav); const label=currentSeries==='nav'?'单位净值':currentSeries==='return'?'累计收益率':'基金归一化净值'; const ctx2=canvas.getContext('2d'); ctx2.setTransform(state.dpr,0,0,state.dpr,0,0); ctx2.strokeStyle='rgba(17,24,39,.12)'; ctx2.beginPath(); ctx2.moveTo(p.x,state.pad.top); ctx2.lineTo(p.x,state.h-state.pad.bottom); ctx2.stroke(); ctx2.beginPath(); ctx2.arc(p.x,p.y,5.5,0,Math.PI*2); ctx2.fillStyle='#111827'; ctx2.fill(); tooltip.innerHTML=`<div class="t1">${p.row.valuation_date}</div><div>${label}：${value}</div>`; tooltip.style.opacity=1; const margin=12, ttWidth=tooltip.offsetWidth||140, ttHeight=tooltip.offsetHeight||48; let left=p.x-ttWidth/2, top=p.y-ttHeight-14; if(left<margin) left=margin; if(left+ttWidth>state.w-margin) left=state.w-margin-ttWidth; if(top<margin) top=p.y+14; if(top+ttHeight>state.h-margin) top=state.h-margin-ttHeight; tooltip.style.left=`${left}px`; tooltip.style.top=`${top}px`;
        });
        canvas.addEventListener('mouseleave', () => { tooltip.style.opacity=0; drawChart(); });
        canvas._boundHover = true;
      }
    }

    document.querySelectorAll('th[data-key]').forEach(th => th.addEventListener('click', () => sortBy(th.dataset.key)));
    document.getElementById('search').addEventListener('input', e => { const q=e.target.value.trim().toLowerCase(); filtered=data.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q))); sortBy(sortKey,true); });
    document.querySelectorAll('.pill').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.pill').forEach(x => x.classList.remove('active')); btn.classList.add('active'); currentSeries=btn.dataset.series; chartModeByFund[currentFund]=currentSeries; document.getElementById('tooltip').style.opacity=0; document.getElementById('chartDesc').textContent=currentSeries==='compare'?'当前为归一化对比模式，基金与四条宽基指数均从同一起点出发。':'支持窗口自适应、鼠标悬停查看日期与对应数据。'; drawChart(); }));
    document.getElementById('exportBtn').addEventListener('click', () => { const rows=fundConfigs[currentFund].rows; const headers=['估值日期','单位净值','累计收益率','累计单位净值','资产净值','实收资本','收件时间','邮件标题']; const esc=s=>`"${String(s).replaceAll('"','""')}"`; const csv=[headers.join(','), ...rows.map(r => [r.valuation_date,r.unit_nav,r.cum_return,r.accum_nav,r.nav_assets,r.paid_in_capital,esc(r.received_at),esc(r.subject)].join(','))].join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${currentFund}_nav_data.csv`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href); });
    window.addEventListener('resize', drawChart);
    loadData();
  </script>
</body>
