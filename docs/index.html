<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFund — 基金业绩展示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Source+Code+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f6f9fc;
      --card: #ffffff;
      --heading: #061b31;
      --label: #273951;
      --body: #64748d;
      --purple: #533afd;
      --purple-hover: #4434d4;
      --purple-soft: rgba(83,58,253,0.06);
      --purple-border: #b9b9f9;
      --border: #e5edf5;
      --navy-dark: #0d253d;
      --brand-dark: #1c1e54;
      --ruby: #ea2261;
      --magenta: #f96bee;
      --success: #15be53;
      --success-text: #108c3d;
      --shadow-blue: rgba(50,50,93,0.25);
      --shadow-black: rgba(0,0,0,0.1);
      --shadow-ambient: rgba(23,23,23,0.08);
      --shadow-soft: rgba(23,23,23,0.06);
      --up: #dc2626;
      --down: #16a34a;
      --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'Source Code Pro', 'SFMono-Regular', Consolas, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--label);
      font-feature-settings: "ss01";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Navigation ─── */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-size: 18px;
      font-weight: 600;
      color: var(--heading);
      letter-spacing: -0.36px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-brand svg { width: 22px; height: 22px; }
    .nav-fund-tabs { display: flex; gap: 4px; }
    .nav-fund-tab {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      color: var(--body);
      background: transparent;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: -0.08px;
    }
    .nav-fund-tab:hover { color: var(--heading); background: var(--surface); }
    .nav-fund-tab.active {
      color: var(--purple);
      background: var(--purple-soft);
      font-weight: 500;
    }
    .nav-actions { display: flex; gap: 8px; align-items: center; }
    .btn-export {
      font-family: var(--font);
      font-size: 13px;
      font-weight: 400;
      color: var(--purple);
      background: transparent;
      border: 1px solid var(--purple-border);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-export:hover { background: var(--purple-soft); }

    /* ─── Page Container ─── */
    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── Hero ─── */
    .hero { margin-bottom: 48px; }
    .hero-eyebrow {
      font-size: 13px;
      font-weight: 500;
      color: var(--purple);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 300;
      color: var(--heading);
      line-height: 1.15;
      letter-spacing: -0.72px;
      margin-bottom: 10px;
    }
    .hero-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--body);
      line-height: 1.5;
    }
    .hero-updated {
      font-size: 12px;
      font-weight: 300;
      color: var(--body);
      margin-top: 8px;
      opacity: 0.7;
    }

    /* ─── Metric Cards Grid ─── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 16px;
      margin-top: 32px;
    }
    .metric-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 16px;
      transition: box-shadow 0.2s ease;
    }
    .metric-card:hover {
      box-shadow: var(--shadow-blue) 0px 30px 45px -30px, var(--shadow-black) 0px 18px 36px -18px;
    }
    .metric-label {
      font-size: 11px;
      font-weight: 400;
      color: var(--body);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .metric-value {
      font-size: 22px;
      font-weight: 500;
      color: var(--heading);
      font-feature-settings: "tnum";
      letter-spacing: -0.44px;
      line-height: 1.1;
    }
    .metric-note {
      font-size: 11px;
      color: var(--body);
      margin-top: 6px;
      font-weight: 300;
    }
    .pos { color: var(--up); }
    .neg { color: var(--down); }

    /* ─── Return Cards ─── */
    .ret-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .ret-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ret-card .k {
      font-size: 13px;
      font-weight: 400;
      color: var(--body);
    }
    .ret-card .v {
      font-size: 20px;
      font-weight: 500;
      font-feature-settings: "tnum";
      letter-spacing: -0.4px;
    }

    /* ─── Main Layout ─── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      margin-bottom: 32px;
    }

    /* ─── Chart Section ─── */
    .chart-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }
    .chart-section h2 {
      font-size: 20px;
      font-weight: 300;
      color: var(--heading);
      letter-spacing: -0.4px;
      margin-bottom: 6px;
    }
    .chart-section .section-sub {
      font-size: 13px;
      font-weight: 300;
      color: var(--body);
      margin-bottom: 18px;
      line-height: 1.45;
    }
    .chart-toolbar {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .pill {
      font-family: var(--font);
      font-size: 12px;
      font-weight: 400;
      color: var(--body);
      background: transparent;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .pill:hover { border-color: var(--purple-border); color: var(--purple); }
    .pill.active {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
    }
    .chart-shell {
      position: relative;
      height: 380px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    #chart { width: 100%; height: 100%; display: block; }
    .tooltip {
      position: absolute;
      pointer-events: none;
      background: var(--heading);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 300;
      min-width: 120px;
      max-width: 200px;
      opacity: 0;
      transition: opacity 0.12s ease;
      box-shadow: var(--shadow-blue) 0px 14px 21px -14px, var(--shadow-black) 0px 8px 17px -8px;
      white-space: nowrap;
    }
    .tooltip .t1 { font-weight: 500; margin-bottom: 3px; }
    .chart-legend {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      color: var(--body);
      font-size: 11px;
      font-weight: 300;
      flex-wrap: wrap;
    }
    .chart-legend span { display: flex; align-items: center; gap: 6px; }
    .chart-legend span::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .chart-legend .leg-fund::before { background: var(--purple); }
    .chart-legend .leg-ret::before { background: #f59e0b; }
    .chart-legend .leg-idx1::before { background: rgba(99,102,241,0.55); }
    .chart-legend .leg-idx2::before { background: rgba(16,185,129,0.55); }
    .chart-legend .leg-idx3::before { background: rgba(245,158,11,0.55); }
    .chart-legend .leg-idx4::before { background: rgba(236,72,153,0.55); }

    /* ─── Stats Sidebar ─── */
    .stats-sidebar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }
    .stats-sidebar h2 {
      font-size: 18px;
      font-weight: 300;
      color: var(--heading);
      letter-spacing: -0.36px;
      margin-bottom: 6px;
    }
    .stats-sidebar .section-sub {
      font-size: 12px;
      font-weight: 300;
      color: var(--body);
      margin-bottom: 18px;
      line-height: 1.4;
    }
    .stat-list { display: flex; flex-direction: column; }
    .stat-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--border);
    }
    .stat-item:last-child { border-bottom: none; }
    .stat-item .k {
      font-size: 12px;
      font-weight: 300;
      color: var(--body);
    }
    .stat-item .v {
      font-size: 13px;
      font-weight: 500;
      color: var(--heading);
      text-align: right;
      font-feature-settings: "tnum";
    }
    .stat-item .v .sub {
      font-weight: 300;
      color: var(--body);
      font-size: 11px;
    }

    /* ─── Table Section ─── */
    .table-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
    }
    .table-header h2 {
      font-size: 18px;
      font-weight: 300;
      color: var(--heading);
      letter-spacing: -0.36px;
      margin-bottom: 4px;
    }
    .table-header .sub {
      font-size: 12px;
      color: var(--body);
      font-weight: 300;
    }
    .table-header input[type="search"] {
      font-family: var(--font);
      font-size: 13px;
      color: var(--heading);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 8px 12px;
      min-width: 220px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .table-header input[type="search"]:focus {
      border-color: var(--purple);
    }
    .table-header input[type="search"]::placeholder {
      color: var(--body);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 12px;
      font-weight: 300;
    }
    th {
      color: var(--body);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
    }
    th:hover { color: var(--heading); }
    tbody tr { transition: background 0.1s ease; }
    tbody tr:hover { background: var(--surface); }
    td { color: var(--label); font-feature-settings: "tnum"; }
    td.mono { font-family: var(--mono); font-size: 11px; font-weight: 400; }

    /* ─── Footer ─── */
    .footer {
      max-width: 1120px;
      margin: 0 auto;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      font-weight: 300;
      background: var(--brand-dark);
      border-top: none;
    }

    /* ─── Date Range Bar ─── */
    .range-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .range-bar .range-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--body);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .range-bar .range-pills { display: flex; gap: 4px; }
    .range-bar input[type="date"] {
      font-family: var(--font);
      font-size: 12px;
      color: var(--heading);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s ease;
    }
    .range-bar input[type="date"]:focus { border-color: var(--purple); }
    .range-bar .range-sep {
      font-size: 12px;
      color: var(--body);
      font-weight: 300;
    }
    .range-bar .range-reset {
      font-family: var(--font);
      font-size: 11px;
      color: var(--purple);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .range-bar .range-reset:hover { background: var(--purple-soft); }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      .metrics-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 980px) {
      .main-layout { grid-template-columns: 1fr; }
      .ret-grid { grid-template-columns: repeat(2, 1fr); }
      .hero h1 { font-size: 28px; letter-spacing: -0.56px; }
    }
    @media (max-width: 640px) {
      .metrics-grid, .ret-grid { grid-template-columns: 1fr; }
      .page { padding: 24px 16px 60px; }
      .hero { margin-bottom: 32px; }
      .hero h1 { font-size: 24px; letter-spacing: -0.48px; }
      .nav-inner { padding: 0 16px; }
      .table-header { flex-direction: column; align-items: stretch; }
      .table-header input[type="search"] { min-width: auto; }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <div class="nav-brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="#533afd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        DFund
      </div>
      <div class="nav-fund-tabs" id="fundTabs"></div>
      <div class="nav-actions">
        <button class="btn-export" id="exportBtn">导出 CSV</button>
      </div>
    </div>
  </nav>

  <!-- Page -->
  <div class="page">
    <!-- Hero -->
    <section class="hero">
      <div class="hero-eyebrow">基金业绩概览</div>
      <h1 id="heroTitle">加载中...</h1>
      <div class="hero-sub" id="heroSub">正在加载基金与指数数据...</div>
      <div class="hero-updated" id="lastUpdatedText">最后更新时间：加载中</div>
      <div class="metrics-grid" id="metricGrid"></div>
    </section>

    <!-- Return Cards -->
    <div class="ret-grid" id="retGrid"></div>

    <!-- Date Range Selector -->
    <div class="range-bar" id="rangeBar">
      <span class="range-label">时段</span>
      <div class="range-pills">
        <button class="pill active" data-range="all">全部</button>
        <button class="pill" data-range="1m">近1月</button>
        <button class="pill" data-range="3m">近3月</button>
        <button class="pill" data-range="ytd">今年以来</button>
      </div>
      <input type="date" id="rangeFrom" />
      <span class="range-sep">—</span>
      <input type="date" id="rangeTo" />
      <button class="range-reset" id="rangeReset" style="display:none;">重置</button>
    </div>

    <!-- Chart + Stats -->
    <div class="main-layout">
      <section class="chart-section">
        <h2>净值与累计收益图表</h2>
        <div class="section-sub" id="chartDesc">支持窗口自适应、鼠标悬停查看日期与对应数据。</div>
        <div class="chart-toolbar">
          <button class="pill" data-series="nav">单位净值</button>
          <button class="pill" data-series="return">累计收益率</button>
          <button class="pill active" data-series="compare">归一化对比</button>
        </div>
        <div class="chart-shell" id="chartShell">
          <canvas id="chart"></canvas>
          <div class="tooltip" id="tooltip"></div>
        </div>
        <div class="chart-legend">
          <span class="leg-fund">基金主线</span>
          <span class="leg-ret">基金累计收益率</span>
          <span class="leg-idx1">上证指数</span>
          <span class="leg-idx2">沪深300</span>
          <span class="leg-idx3">中证500</span>
          <span class="leg-idx4">中证1000</span>
        </div>
      </section>

      <aside class="stats-sidebar">
        <h2>关键业绩指标</h2>
        <div class="section-sub">先看收益，再看风险，最后看极值与回撤。</div>
        <div class="stat-list" id="statList"></div>
      </aside>
    </div>

    <!-- Table -->
    <section class="table-section">
      <div class="table-header">
        <div>
          <h2>净值明细表</h2>
          <div class="sub">可搜索、排序，适合核对原始记录与提取结果。</div>
        </div>
        <input id="search" type="search" placeholder="搜索日期、标题、净值..." />
      </div>
      <table id="navTable">
        <thead>
          <tr>
            <th data-key="valuation_date">估值日期</th>
            <th data-key="unit_nav">单位净值</th>
            <th data-key="cum_return">累计收益率</th>
            <th data-key="accum_nav">累计单位净值</th>
            <th data-key="nav_assets">资产净值</th>
            <th data-key="paid_in_capital">实收资本</th>
            <th data-key="received_at">收件时间</th>
            <th data-key="subject">邮件标题</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </div>

  <!-- Footer -->
  <div style="background:var(--brand-dark);">
    <div class="footer">
      <span>DFund 基金业绩展示 — 数据来源于 Apple Mail 邮件抓取</span>
      <span>Design inspired by Stripe</span>
    </div>
  </div>

  <script>
    let fundConfigs = {};
    let benchmarks = {};
    let currentFund = 'SBFZ85';
    const chartModeByFund = { SBFZ85: 'compare', SBFZ95: 'compare' };
    let data = [];
    let filtered = [];
    let sortKey = 'valuation_date';
    let sortAsc = false;
    let currentSeries = 'compare';
    let dateRange = { from: null, to: null, preset: 'all' };

    const fmtPct = v => `${v >= 0 ? '+' : ''}${(v * 100).toFixed(2)}%`;
    const fmtNav = v => Number(v).toFixed(4);
    const fmtMoney = v => Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    async function fetchJson(paths) {
      for (const path of paths) {
        try {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) continue;
          return await res.json();
        } catch (e) {}
      }
      throw new Error('无法加载数据文件: ' + paths.join(' | '));
    }

    async function loadData() {
      const [f85, f95, idx] = await Promise.all([
        fetchJson(['./data/sbfz85_nav_enriched.json', 'data/sbfz85_nav_enriched.json']),
        fetchJson(['./data/sbfz95_nav_enriched.json', 'data/sbfz95_nav_enriched.json']),
        fetchJson(['./data/benchmark_indices.json', 'data/benchmark_indices.json']),
      ]);
      fundConfigs = {
        SBFZ85: { name: '衍盛天璇CTA一号私募证券投资基金', code: 'SBFZ85', ...f85 },
        SBFZ95: { name: '衍盛开阳多策略混合私募证券投资基金', code: 'SBFZ95', ...f95 },
      };
      benchmarks = idx;
      renderFundTabs();
      applyFundConfig();
      renderTable();
      drawChart();
    }

    function renderFundTabs() {
      const tabs = document.getElementById('fundTabs');
      tabs.innerHTML = `
        <button class="nav-fund-tab ${currentFund === 'SBFZ85' ? 'active' : ''}" data-fund="SBFZ85">天璇 CTA</button>
        <button class="nav-fund-tab ${currentFund === 'SBFZ95' ? 'active' : ''}" data-fund="SBFZ95">开阳 多策略</button>`;
      tabs.querySelectorAll('.nav-fund-tab').forEach(btn => btn.addEventListener('click', () => {
        currentFund = btn.dataset.fund;
        renderFundTabs();
        applyFundConfig();
        renderTable();
        drawChart();
      }));
    }

    function applyFundConfig() {
      data = fundConfigs[currentFund].rows;
      filtered = [...data].sort((a, b) => b.valuation_date.localeCompare(a.valuation_date));
      currentSeries = chartModeByFund[currentFund] || 'compare';
      document.querySelectorAll('.pill').forEach(x => x.classList.toggle('active', x.dataset.series === currentSeries));
      const m = fundConfigs[currentFund].metrics;
      document.getElementById('heroTitle').textContent = `${fundConfigs[currentFund].name}`;
      document.getElementById('heroSub').textContent = `基于邮件抓取的 ${data.length} 个估值日样本，覆盖 ${data[0].valuation_date} 至 ${data[data.length - 1].valuation_date}。`;
      document.getElementById('lastUpdatedText').textContent = `最后更新时间：${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}`;
      document.getElementById('metricGrid').innerHTML = `
        <div class="metric-card"><div class="metric-label">最新单位净值</div><div class="metric-value">${fmtNav(m.latest_nav)}</div><div class="metric-note">截至 ${m.latest_date}</div></div>
        <div class="metric-card"><div class="metric-label">成立以来收益</div><div class="metric-value ${m.since_inception >= 0 ? 'pos' : 'neg'}">${fmtPct(m.since_inception)}</div><div class="metric-note">相对首个样本日</div></div>
        <div class="metric-card"><div class="metric-label">近 20 个估值日</div><div class="metric-value ${m.last_20d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_20d)}</div><div class="metric-note">短中期表现</div></div>
        <div class="metric-card"><div class="metric-label">最大回撤</div><div class="metric-value neg">-${(m.max_drawdown.value * 100).toFixed(2)}%</div><div class="metric-note">${m.max_drawdown.start.valuation_date} → ${m.max_drawdown.end.valuation_date}</div></div>
        <div class="metric-card"><div class="metric-label">年化波动率</div><div class="metric-value">${(m.annualized_vol * 100).toFixed(2)}%</div><div class="metric-note">按样本日频近似</div></div>
        <div class="metric-card"><div class="metric-label">样本区间</div><div class="metric-value">${data.length}</div><div class="metric-note">条记录</div></div>`;
      document.getElementById('retGrid').innerHTML = `
        <div class="ret-card"><div class="k">近 5 个估值日收益</div><div class="v ${m.last_5d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_5d)}</div></div>
        <div class="ret-card"><div class="k">近 20 个估值日收益</div><div class="v ${m.last_20d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_20d)}</div></div>
        <div class="ret-card"><div class="k">近 60 个估值日收益</div><div class="v ${m.last_60d >= 0 ? 'pos' : 'neg'}">${fmtPct(m.last_60d)}</div></div>`;
      document.getElementById('statList').innerHTML = `
        <div class="stat-item"><div class="k">最高单位净值</div><div class="v pos">${fmtNav(m.max_nav.unit_nav)}<br><span class="sub">${m.max_nav.valuation_date}</span></div></div>
        <div class="stat-item"><div class="k">最低单位净值</div><div class="v neg">${fmtNav(m.min_nav.unit_nav)}<br><span class="sub">${m.min_nav.valuation_date}</span></div></div>
        <div class="stat-item"><div class="k">最大回撤区间</div><div class="v">${m.max_drawdown.start.valuation_date} → ${m.max_drawdown.end.valuation_date}</div></div>
        <div class="stat-item"><div class="k">回撤对应净值</div><div class="v">${fmtNav(m.max_drawdown.start.unit_nav)} → ${fmtNav(m.max_drawdown.end.unit_nav)}</div></div>
        <div class="stat-item"><div class="k">样本起始日</div><div class="v">${data[0].valuation_date}</div></div>
        <div class="stat-item"><div class="k">样本最新日</div><div class="v">${data[data.length - 1].valuation_date}</div></div>`;
      document.getElementById('chartDesc').textContent = currentSeries === 'compare' ? '当前为归一化对比模式，基金与四条宽基指数均从同一起点出发。' : '支持窗口自适应、鼠标悬停查看日期与对应数据。';
    }

    function renderTable() {
      const tbody = document.querySelector('#navTable tbody');
      tbody.innerHTML = filtered.map(r => `<tr>
        <td class="mono">${r.valuation_date}</td>
        <td class="mono ${r.unit_nav >= 1 ? 'pos' : 'neg'}">${fmtNav(r.unit_nav)}</td>
        <td class="mono ${r.cum_return >= 0 ? 'pos' : 'neg'}">${fmtPct(r.cum_return)}</td>
        <td class="mono">${fmtNav(r.accum_nav)}</td>
        <td class="mono">${fmtMoney(r.nav_assets)}</td>
        <td class="mono">${fmtMoney(r.paid_in_capital)}</td>
        <td>${r.received_at}</td>
        <td>${r.subject}</td>
      </tr>`).join('');
    }

    function sortBy(key, keepDirection = false) {
      if (!keepDirection) {
        if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
      }
      filtered.sort((a, b) => {
        const va = a[key], vb = b[key];
        if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
        return sortAsc ? String(va).localeCompare(String(vb), 'zh-CN') : String(vb).localeCompare(String(va), 'zh-CN');
      });
      renderTable();
    }

    function drawChart() {
      const canvas = document.getElementById('chart');
      const shell = document.getElementById('chartShell');
      const tooltip = document.getElementById('tooltip');
      const dpr = window.devicePixelRatio || 1;
      const w = shell.clientWidth;
      const h = shell.clientHeight;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      const ctx = canvas.getContext('2d');
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      const dateFiltered = getFilteredByDate(data);
      const sorted = [...dateFiltered].sort((a, b) => a.valuation_date.localeCompare(b.valuation_date));
      const pad = { top: 20, right: 16, bottom: 32, left: 54 };
      const fundSeriesAccessor = currentSeries === 'nav' ? (d => d.unit_nav) : currentSeries === 'return' ? (d => d.cum_return) : (d => d.unit_nav / sorted[0].unit_nav);
      const benchmarkSeries = ['上证指数','沪深300','中证500','中证1000'].flatMap(name => (benchmarks[name] || []).map(item => ({ ...item, name }))).filter(item => sorted.some(s => s.valuation_date === item.date));
      const values = [...sorted.map(fundSeriesAccessor), ...(currentSeries === 'compare' ? benchmarkSeries.map(d => d.norm) : [])];
      const min = Math.min(...values), max = Math.max(...values), range = (max - min) || 1;
      const x = i => pad.left + (i * (w - pad.left - pad.right) / Math.max(sorted.length - 1, 1));
      const y = v => pad.top + (max - v) * (h - pad.top - pad.bottom) / range;

      // Background
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#f6f9fc';
      ctx.fillRect(0, 0, w, h);

      // Grid lines
      for (let i = 0; i < 5; i++) {
        const yy = pad.top + i * (h - pad.top - pad.bottom) / 4;
        ctx.strokeStyle = '#e5edf5';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(pad.left, yy);
        ctx.lineTo(w - pad.right, yy);
        ctx.stroke();
        const lv = max - i * range / 4;
        const label = currentSeries === 'nav' ? fmtNav(lv) : currentSeries === 'return' ? fmtPct(lv) : `${(lv * 100).toFixed(1)}%`;
        ctx.fillStyle = '#64748d';
        ctx.font = '10px "Source Code Pro", monospace';
        ctx.textAlign = 'right';
        ctx.fillText(label, pad.left - 8, yy + 4);
      }
      ctx.textAlign = 'left';

      // Benchmark lines
      const indexMeta = [
        { name: '上证指数', color: 'rgba(99,102,241,0.50)' },
        { name: '沪深300', color: 'rgba(16,185,129,0.50)' },
        { name: '中证500', color: 'rgba(245,158,11,0.50)' },
        { name: '中证1000', color: 'rgba(236,72,153,0.50)' },
      ];
      indexMeta.forEach(meta => {
        if (currentSeries !== 'compare') return;
        const series = (benchmarks[meta.name] || []).filter(d => sorted.some(s => s.valuation_date === d.date));
        if (!series.length) return;
        ctx.beginPath();
        series.forEach((d, i) => {
          const idx = sorted.findIndex(s => s.valuation_date === d.date);
          if (idx < 0) return;
          const px = x(idx), py = y(d.norm);
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        });
        ctx.lineWidth = 1.2;
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = meta.color;
        ctx.stroke();
        ctx.setLineDash([]);
      });

      // Fund area fill
      const stroke = currentSeries === 'nav' ? '#533afd' : currentSeries === 'return' ? '#f59e0b' : '#533afd';
      const fill = currentSeries === 'nav' ? 'rgba(83,58,253,0.08)' : currentSeries === 'return' ? 'rgba(245,158,11,0.08)' : 'rgba(83,58,253,0.06)';

      ctx.beginPath();
      sorted.forEach((d, i) => {
        const px = x(i), py = y(fundSeriesAccessor(d));
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      });
      ctx.lineWidth = 2;
      ctx.strokeStyle = stroke;
      ctx.stroke();
      ctx.lineTo(x(sorted.length - 1), h - pad.bottom);
      ctx.lineTo(x(0), h - pad.bottom);
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();

      // Data points
      const points = sorted.map((d, i) => ({ x: x(i), y: y(fundSeriesAccessor(d)), row: d }));
      points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = stroke;
        ctx.fill();
      });
      canvas._points = points;
      canvas._drawState = { dpr, pad, h, w, sorted };
      canvas._baseImage = ctx.getImageData(0, 0, canvas.width, canvas.height);

      if (!canvas._boundHover) {
        canvas.addEventListener('mousemove', e => {
          const r = canvas.getBoundingClientRect();
          const mx = e.clientX - r.left, my = e.clientY - r.top;
          const livePoints = canvas._points || [];
          let nearest = -1, dist = Infinity;
          livePoints.forEach((p, idx) => { const d = Math.hypot(p.x - mx, p.y - my); if (d < dist) { dist = d; nearest = idx; } });
          const ctx2 = canvas.getContext('2d');
          const base = canvas._baseImage;
          if (base) ctx2.putImageData(base, 0, 0);
          const p = (canvas._points || [])[nearest];
          const state = canvas._drawState;
          if (!p || !state) return;
          const value = currentSeries === 'nav' ? fmtNav(p.row.unit_nav) : currentSeries === 'return' ? fmtPct(p.row.cum_return) : fmtNav(p.row.unit_nav / state.sorted[0].unit_nav);
          const label = currentSeries === 'nav' ? '单位净值' : currentSeries === 'return' ? '累计收益率' : '基金归一化净值';
          ctx2.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
          // Crosshair
          ctx2.strokeStyle = 'rgba(6,27,49,0.10)';
          ctx2.lineWidth = 1;
          ctx2.beginPath();
          ctx2.moveTo(p.x, state.pad.top);
          ctx2.lineTo(p.x, state.h - state.pad.bottom);
          ctx2.stroke();
          // Highlight point
          ctx2.beginPath();
          ctx2.arc(p.x, p.y, 5, 0, Math.PI * 2);
          ctx2.fillStyle = '#061b31';
          ctx2.fill();
          ctx2.beginPath();
          ctx2.arc(p.x, p.y, 3, 0, Math.PI * 2);
          ctx2.fillStyle = '#ffffff';
          ctx2.fill();
          // Tooltip
          tooltip.innerHTML = `<div class="t1">${p.row.valuation_date}</div><div>${label}：${value}</div>`;
          tooltip.style.opacity = 1;
          const margin = 10, ttWidth = tooltip.offsetWidth || 130, ttHeight = tooltip.offsetHeight || 44;
          let left = p.x - ttWidth / 2, top = p.y - ttHeight - 12;
          if (left < margin) left = margin;
          if (left + ttWidth > state.w - margin) left = state.w - margin - ttWidth;
          if (top < margin) top = p.y + 12;
          tooltip.style.left = `${left}px`;
          tooltip.style.top = `${top}px`;
        });
        canvas.addEventListener('mouseleave', () => {
          if (canvas._baseImage) canvas.getContext('2d').putImageData(canvas._baseImage, 0, 0);
          tooltip.style.opacity = 0;
        });
        canvas._boundHover = true;
      }
    }

    // Event listeners
    document.querySelectorAll('th[data-key]').forEach(th => th.addEventListener('click', () => sortBy(th.dataset.key)));
    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      filtered = data.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
      sortBy(sortKey, true);
    });
    document.querySelectorAll('.pill').forEach(btn => btn.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      currentSeries = btn.dataset.series;
      chartModeByFund[currentFund] = currentSeries;
      document.getElementById('tooltip').style.opacity = 0;
      document.getElementById('chartDesc').textContent = currentSeries === 'compare' ? '当前为归一化对比模式，基金与四条宽基指数均从同一起点出发。' : '支持窗口自适应、鼠标悬停查看日期与对应数据。';
      drawChart();
    }));
    document.getElementById('exportBtn').addEventListener('click', () => {
      const rows = fundConfigs[currentFund].rows;
      const headers = ['估值日期','单位净值','累计收益率','累计单位净值','资产净值','实收资本','收件时间','邮件标题'];
      const esc = s => `"${String(s).replaceAll('"','""')}"`;
      const csv = [headers.join(','), ...rows.map(r => [r.valuation_date,r.unit_nav,r.cum_return,r.accum_nav,r.nav_assets,r.paid_in_capital,esc(r.received_at),esc(r.subject)].join(','))].join('\n');
      const blob = new Blob(['\ufeff'+csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${currentFund}_nav_data.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(a.href);
    });
    window.addEventListener('resize', drawChart);

    // ─── Date Range Selector ───
    function getFilteredByDate(rows) {
      if (dateRange.preset === 'all' && !dateRange.from && !dateRange.to) return rows;
      const from = dateRange.from || '0000-00-00';
      const to = dateRange.to || '9999-99-99';
      return rows.filter(r => r.valuation_date >= from && r.valuation_date <= to);
    }

    function applyDateRange(preset, from, to) {
      if (preset) {
        dateRange.preset = preset;
        dateRange.from = null;
        dateRange.to = null;
        const last = data[data.length - 1].valuation_date;
        const d = new Date(last);
        if (preset === '1m') { d.setMonth(d.getMonth() - 1); dateRange.from = d.toISOString().slice(0, 10); }
        else if (preset === '3m') { d.setMonth(d.getMonth() - 3); dateRange.from = d.toISOString().slice(0, 10); }
        else if (preset === 'ytd') { dateRange.from = d.getFullYear() + '-01-01'; }
        document.getElementById('rangeFrom').value = dateRange.from || '';
        document.getElementById('rangeTo').value = '';
        document.getElementById('rangeReset').style.display = preset === 'all' ? 'none' : 'inline';
      } else {
        dateRange.preset = 'custom';
        dateRange.from = from || null;
        dateRange.to = to || null;
        document.getElementById('rangeReset').style.display = (from || to) ? 'inline' : 'none';
      }
      document.querySelectorAll('#rangeBar .pill').forEach(p => p.classList.toggle('active', p.dataset.range === dateRange.preset));
      filtered = getFilteredByDate([...data]).sort((a, b) => b.valuation_date.localeCompare(a.valuation_date));
      renderTable();
      drawChart();
    }

    document.querySelectorAll('#rangeBar .pill').forEach(btn => btn.addEventListener('click', () => applyDateRange(btn.dataset.range)));
    document.getElementById('rangeFrom').addEventListener('change', e => applyDateRange(null, e.target.value, document.getElementById('rangeTo').value));
    document.getElementById('rangeTo').addEventListener('change', e => applyDateRange(null, document.getElementById('rangeFrom').value, e.target.value));
    document.getElementById('rangeReset').addEventListener('click', () => {
      dateRange = { from: null, to: null, preset: 'all' };
      document.getElementById('rangeFrom').value = '';
      document.getElementById('rangeTo').value = '';
      applyDateRange('all');
    });

    loadData();
  </script>
</body>
</html>
